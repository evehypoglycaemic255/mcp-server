services:
  db:
    image: pgvector/pgvector:pg15
    container_name: mcp_postgres
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
      POSTGRES_DB: mcp_server_db
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_server_db"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

