  dashboard:
    build: ./dashboard
    container_name: mcp_dashboard
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://mcp:mcp@db:5432/mcp_server_db
    volumes:
      - ./dashboard:/app
      - ./mcp_server:/mcp_server
      - C:/Users/minht/.gemini/antigravity/brain:/antigravity_brain:ro
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
